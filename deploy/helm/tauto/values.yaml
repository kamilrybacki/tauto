image:
  repository: ghcr.io/kamilrybacki/tauto
  # Pinned to the published image's short commit SHA. CI bumps this on every
  # main build (see the "Pin chart image tag" step in .github/workflows/ci.yml),
  # so the chart tracks the latest image while staying an immutable, ArgoCD-
  # friendly pin. The image is public — no pull secret needed.
  tag: "646229a"
  pullPolicy: IfNotPresent

replicas: 1
port: 4000

# SLM prose→DSL translation is a REQUIRED capability (POST /api/v1/translate,
# MCP translate_rule). The DeepSeek key is read from a Secret — never committed
# here. Provision it out-of-band (this homelab: a SOPS SopsSecret in the private
# argocd-apps repo, mirroring n8n-main-secrets' deepseek_api_key). optional:true
# keeps the pod up if the key isn't provisioned yet (translate 503s until then).
slm:
  provider: deepseek
  secret:
    name: tauto-secrets
    key: deepseek_api_key
    optional: true

# Public hostname the Traefik IngressRoute matches. Placeholder default — the
# real host is injected as an ArgoCD Application helm parameter, so it stays out
# of this public repo.
host: tauto.example.com

storage:
  size: 1Gi
  storageClass: nfs

# LAN CIDR the NetworkPolicy admits. Placeholder default — the real subnet is
# injected as an ArgoCD Application helm parameter (kept out of this public repo).
allowedLanCidr: 10.0.0.0/8

# The web pod no longer runs lake build (that moved to the lake-worker service),
# so it's back to a modest footprint.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 192Mi

probes:
  liveness:
    path: /api/v1/contracts
    initialDelaySeconds: 5
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /api/v1/contracts
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# Lean build service — a separate Deployment+Service running `tauto lake-worker`
# from the fat (Lean-toolchain) image. The web pod POSTs proof workspaces to it
# (TAUTO_LAKE_URL) so the Proofs panel can compile without bloating or slowing
# the web image. Disable to run the web app alone (Proofs then shows
# "lake not available"). Because it composes the generic build contract, this
# can also point at any external Lake service instead of this Deployment.
lakeWorker:
  enabled: true
  image:
    repository: ghcr.io/kamilrybacki/tauto-lake
    # Manually managed (NOT auto-bumped) — the worker changes rarely. 4-space
    # indent keeps it clear of the web-image tag auto-bump sed in CI.
    tag: latest
    pullPolicy: Always
  port: 4001
  # lake build is CPU/memory heavy — the headroom lives here now, not the web pod.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
