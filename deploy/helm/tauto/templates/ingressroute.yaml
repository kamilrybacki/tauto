apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tauto
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints: [web]
  routes:
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      middlewares:
        - name: caddy-source
      services:
        - name: tauto
          port: {{ .Values.port }}
