apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tauto
  namespace: {{ .Release.Namespace }}
  labels:
    app: tauto
spec:
  podSelector:
    matchLabels:
      app: tauto
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - port: {{ .Values.port }}
    from:
    # same namespace — health probes
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
    # kube-system — Traefik routes the edge IngressRoute (Caddy → VIP)
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    # LAN access
    - ipBlock:
        cidr: {{ .Values.allowedLanCidr }}
