apiVersion: apps/v1
kind: Deployment
metadata:
  name: tauto
  namespace: {{ .Release.Namespace }}
  labels:
    app: tauto
spec:
  revisionHistoryLimit: 2
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tauto
  template:
    metadata:
      labels:
        app: tauto
    spec:
      automountServiceAccountToken: false
      {{- if .Values.seedBenchmark }}
      # Idempotent seed: migrate any flat top-level rules into a `default`
      # project, then drop in the bundled benchmark as an example project. Runs
      # every start; safe to repeat (mv-once + no-clobber copy).
      initContainers:
        - name: seed-projects
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if ls /contracts/*.md >/dev/null 2>&1; then
                mkdir -p /contracts/default
                mv /contracts/*.md /contracts/default/ 2>/dev/null || true
                mv /contracts/_history.json /contracts/default/ 2>/dev/null || true
                mv /contracts/*.odcs.yaml /contracts/default/ 2>/dev/null || true
              fi
              mkdir -p /contracts/benchmark
              cp -rn /opt/tauto/benchmark/. /contracts/benchmark/ 2>/dev/null || true
              echo "seed: projects = $(ls -d /contracts/*/ 2>/dev/null | xargs -n1 basename | tr '\n' ' ')"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - mountPath: /contracts
              name: contracts
      {{- end }}
      containers:
        - name: tauto
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - /contracts
            - --port
            - {{ .Values.port | quote }}
            - --ui-dist
            - /opt/tauto/ui/dist
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: TAUTO_SKIP_LEAN_CHECK
              value: "1"
            {{- if .Values.lakeWorker.enabled }}
            - name: TAUTO_LAKE_URL
              value: "http://tauto-lake:{{ .Values.lakeWorker.port }}/build"
            {{- end }}
            # SLM prose→DSL translation (required capability). The key comes from
            # a Secret (SOPS-managed, out of this public repo); optional:true so a
            # not-yet-provisioned key can't wedge the pod — /translate just 503s
            # until the Secret exists.
            - name: TAUTO_SLM_PROVIDER
              value: {{ .Values.slm.provider | quote }}
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slm.secret.name | quote }}
                  key: {{ .Values.slm.secret.key | quote }}
                  optional: {{ .Values.slm.secret.optional }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          volumeMounts:
            - name: contracts
              mountPath: /contracts
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: contracts
          persistentVolumeClaim:
            claimName: tauto-contracts
