apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tauto.fullname" . }}
  labels:
    {{- include "tauto.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tauto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tauto.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: tauto
          image: {{ include "tauto.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: TAUTO_SKIP_LEAN_CHECK
              value: "1"
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          args:
            - serve
            - /contracts
            - --port
            - "4000"
            - --ui-dist
            - /opt/tauto/ui/dist
          volumeMounts:
            - name: contracts
              mountPath: /contracts
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/v1/contracts
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/contracts
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: contracts
          {{- if eq .Values.contracts.source "hostPath" }}
          hostPath:
            path: {{ .Values.contracts.hostPath.path }}
            type: Directory
          {{- else if eq .Values.contracts.source "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.contracts.pvc.existingClaim | default (include "tauto.fullname" .) }}
          {{- else if eq .Values.contracts.source "configmap" }}
          configMap:
            name: {{ include "tauto.fullname" . }}-contracts
          {{- end }}
