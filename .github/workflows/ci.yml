name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --lib

      - name: Compile the optional database feature
        run: cargo build --lib --features database

  build:
    name: Build release binary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: tauto-linux-x86_64
          path: target/release/tauto
          if-no-files-found: error
          retention-days: 30

  lean-verify:
    name: Lean workspace verification
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build tauto binary
        run: cargo build --release

      - name: Install elan and Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Run integration tests (requires lake in PATH)
        run: cargo test --test cli_integration

      - name: Verify workspace compiles with lake build
        run: |
          ./target/release/tauto verify tests/fixtures/orders.md \
            --output /tmp/lean-workspace \
            --lean-check

  e2e:
    name: E2E – contract lifecycle and conflict rejection
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artefact
        uses: actions/download-artifact@v4
        with:
          name: tauto-linux-x86_64
          path: dist/

      - name: Mark binary executable
        run: chmod +x dist/tauto

      - name: Run E2E test suite
        env:
          TAUTO_BIN: dist/tauto
          TAUTO_SKIP_LEAN_CHECK: "1"
        run: bash tests/e2e/run.sh

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tauto
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Pin chart image tag to the published SHA
        if: github.ref == 'refs/heads/main'
        run: |
          SHA="$(git rev-parse --short HEAD)"
          sed -i "s|^\(  tag: \).*|\1\"$SHA\"|" deploy/helm/tauto/values.yaml
          if git diff --quiet deploy/helm/tauto/values.yaml; then
            echo "chart already on $SHA — nothing to do"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/tauto/values.yaml
          git commit -m "chore(deploy): pin image tag to $SHA [skip ci]"
          git push origin HEAD:main

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tauto-linux-x86_64
          path: dist/

      - name: Mark binary executable
        run: chmod +x dist/tauto

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/tauto \
            --repo "${{ github.repository }}" \
            --generate-notes \
            --title "tauto ${{ github.ref_name }}"
